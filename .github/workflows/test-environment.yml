name: Test Environment on Multiple OS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  test-environment:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        miniforge-version: latest
        use-mamba: true

    - name: Display conda info
      shell: bash -l {0}
      run: |
        conda info
        conda list
        conda config --show-sources
        conda config --show

    - name: Create conda environment
      shell: bash -l {0}
      run: |
        conda env create -f environment.yml

    - name: Activate environment and display info
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        conda list
        python --version
        which python

    - name: Run verification script
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python verificar_instalacion.py

    - name: Test NumPy import and basic operations
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "import numpy as np; arr = np.array([1, 2, 3]); assert arr.sum() == 6; print('NumPy OK')"

    - name: Test Matplotlib import and plot creation
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "import matplotlib; matplotlib.use('Agg'); import matplotlib.pyplot as plt; fig, ax = plt.subplots(); plt.close(fig); print('Matplotlib OK')"

    - name: Test Gymnasium import and environment creation
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "import gymnasium as gym; env = gym.make('CartPole-v1'); env.reset(); env.close(); print('Gymnasium OK')"

    - name: Test Jupyter Notebook
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "import jupyter; import notebook; import IPython; print('Jupyter OK')"

    - name: Test tqdm
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "from tqdm import tqdm; import time; [time.sleep(0.001) for _ in tqdm(range(10))]; print('tqdm OK')"

    - name: Test Pygame import
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "import pygame; print(f'Pygame {pygame.version.ver} OK')"

    - name: Test Gymnasium Classic Control environments
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "
        import gymnasium as gym
        # Test MountainCar
        env = gym.make('MountainCar-v0')
        env.reset()
        env.step(0)
        env.close()
        print('MountainCar-v0 OK')
        # Test CartPole
        env = gym.make('CartPole-v1')
        env.reset()
        env.step(0)
        env.close()
        print('CartPole-v1 OK')
        "

    - name: Test Gymnasium Toy Text environments
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "
        import gymnasium as gym
        # Test Blackjack
        env = gym.make('Blackjack-v1')
        env.reset()
        env.step(0)
        env.close()
        print('Blackjack-v1 OK')
        "

    - name: Test Matplotlib 3D plotting
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "
        import matplotlib
        matplotlib.use('Agg')
        from mpl_toolkits.mplot3d import Axes3D
        import matplotlib.pyplot as plt
        import numpy as np
        fig = plt.figure()
        ax = fig.add_subplot(projection='3d')
        X = np.arange(-5, 5, 0.25)
        Y = np.arange(-5, 5, 0.25)
        X, Y = np.meshgrid(X, Y)
        Z = np.sin(np.sqrt(X**2 + Y**2))
        ax.plot_surface(X, Y, Z)
        plt.close(fig)
        print('Matplotlib 3D OK')
        "

    - name: Test MoviePy and FFmpeg
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "
        import moviepy
        print(f'MoviePy {moviepy.__version__} OK')
        "
        # Test ffmpeg is available
        ffmpeg -version

    - name: Test RecordVideo wrapper with actual video creation
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        python -c "
        import gymnasium as gym
        from gymnasium.wrappers import RecordVideo
        import os
        import shutil
        # Create a test video directory
        test_dir = 'test_videos'
        os.makedirs(test_dir, exist_ok=True)
        # Create environment with RecordVideo wrapper
        env = gym.make('CartPole-v1', render_mode='rgb_array')
        env = RecordVideo(env, video_folder=test_dir, episode_trigger=lambda x: True)
        # Run one episode
        env.reset()
        for _ in range(10):
            env.step(env.action_space.sample())
        env.close()
        # Check video was created
        videos = [f for f in os.listdir(test_dir) if f.endswith('.mp4')]
        assert len(videos) > 0, 'No video file was created'
        print(f'RecordVideo OK - Created {len(videos)} video(s)')
        # Cleanup
        shutil.rmtree(test_dir)
        "

    - name: Export environment for debugging (on failure)
      if: failure()
      shell: bash -l {0}
      run: |
        conda activate taller-ia
        conda env export > environment-${{ matrix.os }}-debug.yml

    - name: Upload debug environment (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-environment-${{ matrix.os }}
        path: environment-${{ matrix.os }}-debug.yml
